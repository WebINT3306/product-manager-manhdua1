<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Sản phẩm</title>
</head>
<body>
  <table id="product-table">
    <thead>
      <tr>
        <th>STT</th>
        <th>Tên sản phẩm</th>
        <th>Danh mục</th>
        <th>Đơn giá</th>
        <th>Số lượng</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <form>
    <input id="input-name" type="text" placeholder="Tên sản phẩm" />
    <input id="input-category" type="text" placeholder="Danh mục" />
    <input id="input-price" type="number" placeholder="Đơn giá" />
    <input id="input-quantity" type="number" placeholder="Số lượng" />
    <button id="btn-add" type="button">Thêm sản phẩm</button>
  </form>
</body>

<script>
  const xhr = new XMLHttpRequest();
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      const products = JSON.parse(xhr.responseText);
      const tbody = document.querySelector('#product-table tbody');
      tbody.innerHTML = '';

      products.forEach(function(product, index) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${product.name}</td>
          <td>${product.category}</td>
          <td>${product.price.toLocaleString('vi-VN')} ₫</td>
          <td>${product.quantity}</td>
        `;
        tbody.appendChild(tr);
      });
    }
  };
xhr.open('GET', 'products.json');
xhr.send();
</script>
</html>
